version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: gov
      POSTGRES_PASSWORD: gov
      POSTGRES_DB: governance
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  db-data:
